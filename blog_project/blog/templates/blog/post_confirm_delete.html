{% extends 'base.html' %}

{% block title %}Delete Post — DevBlog{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Delete Post?</h3>
                    <p class="text-muted">
                        Are you sure you want to delete "<strong>{{ object.title }}</strong>"?
                        This action cannot be undone.
                    </p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <a href="{{ object.get_absolute_url }}" class="btn btn-outline-secondary flex-grow-1">
                                <i class="bi bi-arrow-left me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-danger flex-grow-1">
                                <i class="bi bi-trash me-1"></i>Confirm Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
