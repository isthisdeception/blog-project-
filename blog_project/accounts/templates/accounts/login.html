{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login — DevBlog{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="icon-circle bg-primary bg-opacity-10 mx-auto mb-3">
                            <i class="bi bi-box-arrow-in-right text-primary" style="font-size: 2rem;"></i>
                        </div>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Sign in to continue to DevBlog</p>
                    </div>
                    
                    <form method="POST" action="{% url 'accounts:login' %}">
                        {% csrf_token %}
                        
                        {% if next %}
                            <input type="hidden" name="next" value="{{ next }}">
                        {% endif %}
                        
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person me-1"></i>Username
                            </label>
                            <input type="text" name="username" id="username" class="form-control form-control-lg" 
                                   placeholder="Enter your username" required
                                   value="{{ form.username.value|default:'' }}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Password
                            </label>
                            <input type="password" name="password" id="password" class="form-control form-control-lg" 
                                   placeholder="Enter your password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'password_reset' %}" class="text-decoration-none small">
                            Forgot password?
                        </a>
                        <a href="{% url 'accounts:register' %}" class="text-decoration-none small fw-semibold text-primary">
                            Create account
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
