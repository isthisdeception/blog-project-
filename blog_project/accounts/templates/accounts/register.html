{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register — DevBlog{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="icon-circle bg-primary bg-opacity-10 mx-auto mb-3">
                            <i class="bi bi-person-plus text-primary"></i>
                        </div>
                        <h3 class="fw-bold">Create Account</h3>
                        <p class="text-muted">Join our community of writers and readers</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        {% crispy form %}
                    </form>
                    
                    <hr class="my-4">
                    <p class="text-center mb-0">
                        Already have an account? 
                        <a href="{% url 'accounts:login' %}" class="fw-semibold text-primary text-decoration-none">
                            Sign in here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
