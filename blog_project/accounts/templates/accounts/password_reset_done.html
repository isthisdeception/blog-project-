{% extends 'base.html' %}

{% block title %}Reset Sent — DevBlog{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow text-center">
                <div class="card-body p-4 p-md-5">
                    <div class="icon-circle bg-success bg-opacity-10 mx-auto mb-3">
                        <i class="bi bi-envelope-check text-success" style="font-size: 2rem;"></i>
                    </div>
                    <h3 class="fw-bold">Check Your Email</h3>
                    <p class="text-muted mb-4">
                        We've sent you an email with instructions to reset your password.
                        If you don't receive it shortly, please check your spam folder.
                    </p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
