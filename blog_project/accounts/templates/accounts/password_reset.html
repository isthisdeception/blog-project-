{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Reset Password — DevBlog{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="icon-circle bg-warning bg-opacity-10 mx-auto mb-3">
                            <i class="bi bi-question-circle text-warning" style="font-size: 2rem;"></i>
                        </div>
                        <h3 class="fw-bold">Reset Password</h3>
                        <p class="text-muted">Enter your email to receive a reset link</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" id="id_email" class="form-control form-control-lg" 
                                   placeholder="your@email.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                            <i class="bi bi-envelope me-1"></i>Send Reset Link
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    <p class="text-center mb-0">
                        Remember your password? 
                        <a href="{% url 'accounts:login' %}" class="fw-semibold text-primary text-decoration-none">
                            Sign in here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
